<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شمارشگر افتخار ترک سیگار</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a2f1f 0%, #071e12 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Tahoma', 'Vazir', system-ui, sans-serif;
            padding: 1rem;
        }
        .card {
            background: rgba(255,255,240,0.95);
            border-radius: 3rem;
            padding: 2rem 1.5rem;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            text-align: center;
        }
        h1 {
            color: #1e4a2f;
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: #2c6e3c;
            margin-bottom: 2rem;
            font-weight: 500;
            background: #e9f5e6;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }
        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 1.2rem;
            margin: 2rem 0;
        }
        .stat-box {
            background: #fef9e6;
            border-radius: 2rem;
            padding: 1rem 0.5rem;
            border-bottom: 4px solid #f4a261;
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e3a2f;
            font-family: monospace;
        }
        .stat-label {
            font-size: 0.85rem;
            color: #5a4a2e;
            font-weight: 600;
            margin-top: 6px;
        }
        .live-time {
            background: #1e3a2f;
            padding: 1rem;
            border-radius: 2rem;
            color: #f9e0a0;
            margin: 1rem 0;
        }
        .live-time span {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            background: #00000033;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            display: inline-block;
        }
        .quote {
            margin-top: 1.5rem;
            font-style: italic;
            color: #5c6e4a;
            background: #fff3db;
            padding: 0.7rem;
            border-radius: 2rem;
            font-size: 0.85rem;
        }
        footer {
            font-size: 0.7rem;
            margin-top: 1.5rem;
            color: #6b4c2c;
        }
        @media (max-width: 450px) {
            .stat-number { font-size: 1.5rem; }
            .grid-stats { gap: 0.8rem; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🚭 قهرمانی بدون دود</h1>
    <div class="sub">شروع ترک: ۱ می ۲۰۲۶ - ساعت ۲۳:۰۰ ایران</div>

    <div class="grid-stats">
        <div class="stat-box"><div class="stat-number" id="years">۰</div><div class="stat-label">سال ترک</div></div>
        <div class="stat-box"><div class="stat-number" id="weeks">۰</div><div class="stat-label">هفته</div></div>
        <div class="stat-box"><div class="stat-number" id="days">۰</div><div class="stat-label">روز</div></div>
        <div class="stat-box"><div class="stat-number" id="hours">۰</div><div class="stat-label">ساعت</div></div>
    </div>

    <div class="live-time">
        🕊️ کل ساعتهای پاک: <span id="totalHours">۰</span> ساعت
    </div>
    <div class="quote">
        💪 ۱۳ سال سیگار کشیدی، اما از ۱ می ۲۰۲۶ هر ثانیه ریه‌هایت نفس آزادی می‌کشند.
    </div>
    <footer>
        ⏱️ بروزرسانی لحظه‌ای | هر ثانیه بدون دود، یک پیروزی است
    </footer>
</div>

<script>
    // تاریخ و ساعت شروع: ۱ می ۲۰۲۶ ساعت ۲۳:۰۰ به وقت ایران (UTC+3:30)
    // ساخت تاریخ دقیق به روش قابل اعتماد:
    function getStartTimeInIran() {
        // تاریخ به صورت UTC+3:30 ساخته می‌شود
        // 1 May 2026, 23:00 IRST = 2026-05-01T19:30:00Z
        return new Date(Date.UTC(2026, 4, 1, 19, 30, 0));
    }
    
    const START_DATE = getStartTimeInIran();
    
    function updateCounter() {
        const now = new Date();
        // گرفتن زمان UTC فعلی
        const nowUTC = Date.now();
        const startUTC = START_DATE.getTime();
        
        let diffMs = nowUTC - startUTC;
        if (diffMs < 0) diffMs = 0;
        
        const totalSeconds = Math.floor(diffMs / 1000);
        const totalHoursFloat = totalSeconds / 3600;
        const totalHours = Math.floor(totalHoursFloat);
        
        // محاسبه سال (هر سال = 365.25 روز)
        const hoursPerYear = 365.25 * 24;
        const years = totalHoursFloat / hoursPerYear;
        const yearsFull = Math.floor(years);
        
        const remainingHoursAfterYears = totalHoursFloat - (yearsFull * hoursPerYear);
        const hoursPerWeek = 24 * 7;
        const weeks = remainingHoursAfterYears / hoursPerWeek;
        const weeksFull = Math.floor(weeks);
        
        const remainingHoursAfterWeeks = remainingHoursAfterYears - (weeksFull * hoursPerWeek);
        const days = remainingHoursAfterWeeks / 24;
        const daysFull = Math.floor(days);
        
        const hours = remainingHoursAfterWeeks - (daysFull * 24);
        const hoursFull = Math.floor(hours);
        
        // نمایش اعداد
        document.getElementById('years').innerText = yearsFull;
        document.getElementById('weeks').innerText = weeksFull;
        document.getElementById('days').innerText = daysFull;
        document.getElementById('hours').innerText = hoursFull;
        document.getElementById('totalHours').innerText = totalHours;
    }
    
    // بروزرسانی هر ثانیه
    updateCounter();
    setInterval(updateCounter, 1000);
    
    // برای دیباگ در کنسول (اختیاری)
    console.log("شمارشگر از تاریخ: " + START_DATE.toISOString() + " شروع شده");
</script>
</body>
</html>
